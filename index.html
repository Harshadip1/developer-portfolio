<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to build and preview your developer portfolio.">
  <title>Login | Portfolio Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="auth-page">
  <canvas id="particles" class="particles-canvas" aria-hidden="true"></canvas>

  <div class="auth-wrapper">
    <div class="auth-card glass">
      <a href="index.html" class="auth-logo">
        <span class="nav__logo-icon">&lt;/&gt;</span>
        <span>Portfolio<span class="text-gradient">Builder</span></span>
      </a>
      <p class="auth-subtitle">Create your account, add your profile, and preview your live portfolio.</p>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">Login</button>
        <button type="button" class="auth-tab" data-tab="register">Register</button>
      </div>

      <div class="auth-alert" id="auth-alert" role="alert" hidden></div>

      <form class="auth-form active" id="form-login">
        <div class="form-group">
          <input type="email" id="login-email" required placeholder=" " autocomplete="email">
          <label for="login-email">Email</label>
        </div>
        <div class="form-group">
          <input type="password" id="login-password" required placeholder=" " autocomplete="current-password">
          <label for="login-password">Password</label>
        </div>
        <button type="submit" class="btn btn--primary btn--block">
          <span>Sign In</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <form class="auth-form" id="form-register" hidden>
        <div class="form-group">
          <input type="text" id="register-name" required placeholder=" " autocomplete="name">
          <label for="register-name">Full Name</label>
        </div>
        <div class="form-group">
          <input type="email" id="register-email" required placeholder=" " autocomplete="email">
          <label for="register-email">Email</label>
        </div>
        <div class="form-group">
          <input type="password" id="register-password" required placeholder=" " minlength="6" autocomplete="new-password">
          <label for="register-password">Password (min 6 chars)</label>
        </div>
        <button type="submit" class="btn btn--primary btn--block">
          <span>Create Account</span>
          <i class="fas fa-user-plus"></i>
        </button>
      </form>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/particles-lite.js"></script>
</body>
</html>
