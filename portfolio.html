<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Developer Portfolio">
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="loader" id="loader" aria-hidden="true">
    <div class="loader__inner">
      <div class="loader__ring"></div>
      <span class="loader__text" id="loader-text">Loading Portfolio</span>
    </div>
  </div>

  <canvas id="particles" class="particles-canvas" aria-hidden="true"></canvas>

  <div class="preview-bar glass" id="preview-bar" hidden>
    <span><i class="fas fa-eye"></i> Preview mode — this is how visitors will see your portfolio</span>
    <a href="profile.html" class="btn btn--outline btn--sm">Edit Profile</a>
  </div>

  <header class="header" id="header">
    <nav class="nav container">
      <a href="#home" class="nav__logo" id="nav-logo"></a>
      <button class="nav__toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav__menu" id="nav-menu"></ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <i class="fas fa-moon" id="theme-icon"></i>
      </button>
    </nav>
  </header>

  <main id="portfolio-main"></main>

  <footer class="footer" id="portfolio-footer"></footer>

  <div class="popup" id="success-popup" role="alert" aria-live="polite">
    <div class="popup__content glass">
      <i class="fas fa-check-circle"></i>
      <h3>Message Sent!</h3>
      <p>Thank you for reaching out. I'll get back to you soon.</p>
      <button class="btn btn--primary" id="popup-close">Got it</button>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/portfolio-render.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
